<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bar Inventory MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="top-bar" class="top-bar-wrap">
      <header class="page-header">
        <div>
          <h1>Beta Testing Local Hosting - Acton Bar Inventory</h1>
          <p>Track bottles, quantities, and stock status.</p>
        </div>
        <div class="header-actions">
          <button id="add-item-btn" class="btn primary">+ Add Item</button>
          <div class="undo-redo-actions">
            <button id="undo-btn" class="btn" disabled>Undo</button>
            <button id="redo-btn" class="btn" disabled>Redo</button>
          </div>
          <div class="export-actions">
            <button id="export-full-btn" class="btn">Export Full Inventory (CSV)</button>
            <button id="export-order-btn" class="btn">Export Order List (CSV)</button>
          </div>
        </div>
      </header>
    </div>

    <div id="sticky-controls" class="sticky-controls-wrap">
      <nav class="tabs-wrap" aria-label="Inventory Views">
        <button class="tab-btn active" data-tab="Total Stock" type="button">Total Stock</button>
        <button class="tab-btn" data-tab="Liquor" type="button">Liquor</button>
        <button class="tab-btn" data-tab="Wine" type="button">Wine</button>
        <button class="tab-btn" data-tab="Beer" type="button">Beer</button>
        <button class="tab-btn" data-tab="Syrups+" type="button">Syrups+</button>
      </nav>

      <section class="controls card">
        <div id="mobile-search-bar" class="mobile-search-bar">
          <div class="mobile-search-input" aria-label="Search inventory">
            <div class="search-input-wrap">
              <input
                id="search-input"
                type="text"
                placeholder="Search by name"
                autocapitalize="none"
                autocorrect="off"
                autocomplete="off"
                spellcheck="false"
              />
              <button id="clear-search-btn" type="button" class="clear-search-btn hidden" aria-label="Clear search">
                ×
              </button>
            </div>
          </div>
          <div class="mobile-top-actions" aria-label="Quick actions">
            <button id="mobile-add-item-btn" class="btn primary" type="button">+ Add</button>
            <button id="mobile-undo-btn" class="btn" type="button" disabled>Undo</button>
            <button id="mobile-redo-btn" class="btn" type="button" disabled>Redo</button>
            <div class="mobile-sort-wrap">
              <button id="mobile-sort-btn" class="btn" type="button" aria-haspopup="true" aria-expanded="false">Sort</button>
              <div id="mobile-sort-menu" class="mobile-sort-menu hidden" role="menu" aria-label="Sort options">
                <button class="mobile-sort-option" data-sort-preset="status-priority" type="button" role="menuitem">Status Priority</button>
                <button class="mobile-sort-option" data-sort-preset="name-asc" type="button" role="menuitem">Name A–Z</button>
                <button class="mobile-sort-option" data-sort-preset="name-desc" type="button" role="menuitem">Name Z–A</button>
              </div>
            </div>
          </div>
        </div>

        <label>
          Category
          <select id="category-filter"></select>
        </label>

        <label id="wine-type-wrap" class="hidden">
          Wine Type
          <select id="wine-type-filter">
            <option value="All">All</option>
            <option value="Red">Red</option>
            <option value="White">White</option>
            <option value="Sparkling">Sparkling</option>
            <option value="Rose">Rose</option>
          </select>
        </label>

        <label id="beer-packaging-wrap" class="hidden">
          Packaging
          <select id="beer-packaging-filter">
            <option value="All">All</option>
            <option value="Kegs">Kegs</option>
            <option value="Cans">Cans</option>
          </select>
        </label>

        <label>
          Status
          <select id="status-filter"></select>
        </label>

        <label>
          Sort
          <select id="sort-field">
            <option value="status">Status</option>
            <option value="name">Name</option>
            <option value="category">Category</option>
            <option value="updated_at">Updated At</option>
          </select>
        </label>

        <label>
          Order
          <select id="sort-order">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
          </select>
        </label>
      </section>
    </div>

    <main class="inventory-content">

      <section class="card desktop-table-card">
        <div class="table-wrap">
          <table id="items-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Status</th>
                <th>Quantity</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="mobile-quick-list" class="mobile-quick-list" aria-label="Quick inventory actions"></section>

      <p id="empty-state" class="hidden">No items found. Try changing your filters.</p>
      <p id="loading-indicator" class="hidden">Loading...</p>
    </main>

    <div id="toast" class="toast hidden"></div>

    <dialog id="item-dialog">
      <form id="item-form" method="dialog">
        <h2 id="form-title">Add Item</h2>
        <input type="hidden" id="item-id" />

        <label>Name* <input id="name" required maxlength="100" /></label>
        <label>Category* <select id="category" required></select></label>
        <label>Quantity* <input id="quantity" type="number" min="0" step="1" required /></label>
        <label>Unit <select id="unit"><option value="Bottle">Bottle</option><option value="Keg">Keg</option><option value="4Pk">4Pk</option><option value="Can">Can</option></select></label>
        <label>Status* <select id="status" required></select></label>
        <label>Par Level <input id="par_level" type="number" min="0" step="0.1" value="0" /></label>
        <label id="wine-type-input-wrap" class="hidden">Wine Type
          <select id="wine_type">
            <option value="">Select wine type</option>
            <option value="Red">Red</option>
            <option value="White">White</option>
            <option value="Sparkling">Sparkling</option>
            <option value="Rose">Rose</option>
          </select>
        </label>
        <label>Notes <textarea id="notes" rows="3"></textarea></label>

        <p id="form-error" class="form-error"></p>

        <menu>
          <button type="button" id="delete-btn" class="btn danger hidden">Delete</button>
          <button type="button" id="cancel-btn" class="btn">Cancel</button>
          <button type="submit" class="btn primary">Save</button>
        </menu>
      </form>
    </dialog>

    <dialog id="history-dialog">
      <h2>Item History</h2>
      <ul id="history-list"></ul>
      <button id="history-close" class="btn">Close</button>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
